name: talles_costura_app
description: Aplicación para gestión de talles de costura
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  
  flutter_localizations:  
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  
  # Supabase - Base de datos en la nube
  supabase_flutter: ^2.8.0
  
  # Estado
  provider: ^6.1.2
  
  # Almacenamiento local
  shared_preferences: ^2.3.0
  
  # Utilidades - ACTUALIZADO a la versión compatible
  intl: ^0.20.2  # CAMBIADO de 0.19.0 a 0.20.2
  
  # Imágenes
  image_picker: ^1.1.0

  # Notificaciones locales
  flutter_local_notifications: ^18.0.0
  
  # Zonas horarias
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets
  # assets:
  #  - assets/images/
  #  - assets/icons/